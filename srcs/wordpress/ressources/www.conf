[www] #pool name
user = www-data
group = www-data

listen = 9000 #port of internal network
listen.owner = www-data
listen.group = www-data
listen.mode = 0660 #permissions: only owner and group can read write

pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3 #kill excess workers beyond 3 idles
pm.max_requests = 500 #max requests per worker before restart as wp has memleaks
request_terminate_timeout = 300s
chdir = / #neutral path to start process from
catch_workers_output = yes