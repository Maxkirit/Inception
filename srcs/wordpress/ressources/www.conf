[www]
user = nobody
group = nobody

listen = 9000 #port of internal network
listen.owner = nobody
listen.group = nobody
listen.mode = 0660 #permissions: only owner and group can read write

pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.max_requests = 500
request_terminate_timeout = 300s
chdir = /
catch_workers_output = yes
clear_env = no