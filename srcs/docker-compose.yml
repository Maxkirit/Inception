services:
    wordpress:
        container_name: wordpress
        build: ./wordpress
        volumes:
            - ./path/to/wordpress/assets:/workdir
        networks:
            - inception
        env_file: ../.env
        restart: unless-stopped
        depends_on:
            mariadb:
                condition: service_healthy

    mariadb:
        container_name: mariadb
        build:
            context: ./mariadb
            args:
                - MARIADB_CONFIG_FILE=mariadb_config_file.txt
        volumes:
            - ./mariadb/data:/
        networks:
            - inception
        env_file:
            - ../.env
        restart: unless-stopped
    
    nginx:
        container_name: nginx
        build: ./nginx
        volumes:
            - ./path/to/wordpress/assets:/workdir
        ports:
            - "443:443"
        networks:
            - inception
        env_file:
            - ../.env
        restart: unless-stopped
        depends_on:
            mariadb:
                condition: service_healthy

networks:
    inception:
        driver: bridge

