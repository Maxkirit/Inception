services:
    wordpress:
        container_name: wordpress
        build: ./wordpress
        volumes:
            - nginx_wp:/var/www/html
        networks:
            - inception
        env_file: ../.env
        restart: unless-stopped
        secrets:
            - wpadminpwd
            - dbpassword
            - dbrootpassword
            - wp_user_password
        depends_on:
            mariadb:
                condition: service_healthy
            redis:
                condition: service_healthy

    mariadb:
        container_name: mariadb
        build:
            context: ./mariadb
            args:
                - MARIADB_CONFIG_FILE=mariadb_config_file.txt
        volumes:
            - mariadb:/var/lib/mysql
        networks:
            - inception
        env_file:
            - ../.env
        secrets:
            - dbpassword
            - dbrootpassword
        restart: unless-stopped
    
    nginx:
        container_name: nginx
        build: ./nginx
        volumes:
            - nginx_wp:/var/www/html
        ports:
            - "443:443"
        networks:
            - inception
        env_file:
            - ../.env
        secrets:
          - ssl_certificate_key
        restart: unless-stopped
        depends_on:
            wordpress:
              condition: service_healthy
            mariadb:
              condition: service_healthy
            redis:
              condition: service_healthy
    
    adminer:
        container_name: adminer
        build: ./adminer
        env_file:
          - ../.env
        networks:
          - inception
        restart: unless-stopped
        depends_on:
            mariadb:
              condition: service_healthy
    
    redis:
        container_name: redis
        build: ./redis
        networks:
          - inception
        restart: unless-stopped

    ftp:
        container_name: ftp
        build: ./ftp
        networks:
          - inception
        secrets:
          - ftp_password
        ports:
          - "21:21" #control channel
          - "21100-21110:21100-21110" #passive channel
        volumes:
          - nginx_wp:/var/www/html
        restart: unless-stopped
        depends_on:
            wordpress:
              condition: service_healthy

    mariadb-backup:
        container_name: mariadb-backup
        build: ./mariadb-backup
        networks:
          - inception
        volumes:
          - mariadb-copy:/backups #will reach db across docker network
        restart: unless-stopped
        env_file: ../.env
        secrets:
          - dbpassword
        depends_on:
            mariadb:
              condition: service_healthy

networks:
    inception:
        driver: bridge

volumes:
    mariadb:
        name: mariadb_volume
    nginx_wp:
        name: wp_volume
    mariadb-copy:
        name: mariadb-backup-volume
    

secrets:
    dbpassword:
        file: ../secrets/db_password.txt
    dbrootpassword:
        file: ../secrets/db_root_password.txt
    wpadminpwd:
        file: ../secrets/wp_admin_password.txt
    ssl_certificate_key:
        file: ../secrets/ssl_key.pem
    wp_user_password:
        file: ../secrets/wp_user_password.txt
    ftp_password:
        file: ../secrets/ftp_password.txt

